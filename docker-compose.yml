services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/quantbot.db
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      HOLDINGS_HTTP_TIMEOUT: 30
    ports:
      - "8000:8000"
    volumes:
      - api-data:/app/data
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: quantbot
      POSTGRES_USER: quantbot
      POSTGRES_PASSWORD: quantbot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  api-data:
  postgres-data:
